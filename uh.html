<head>

    <style>
        .input {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        input[type=text] {
            width: 80%;
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid;
        }
        .container {
            border: 1px solid;
            width: 80%;
            height: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-radius: 20px;
            box-shadow: 1px 1px 5px;
        }
        a {
            width: 250px;
            padding: 20px 25px;
            border-radius: 15px;
            background-color: rgb(203, 254, 254);
            border: 5px;
            text-decoration: none;
            color: rgb(0, 0, 0);
            transition: 0.5s;
        }
        a:hover {
            background-color: rgb(149, 105, 251);
            transform: scale(1.2);
        }
        .big {
            display: flex;
            width: 100%;
            justify-content: center;
        }
    </style>
</head>
